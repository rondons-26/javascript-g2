<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Depositar</h2>

        <form>
            <div class="mb-3">
                <label for="depositAmount" class="form-label fw-medium">Monto a depositar</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="depositAmount" placeholder="Ej. 1000" min="1" required>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-custom">Realizar depósito</button>
                <a href="menu.html" class="btn btn-light btn-custom text-secondary">Volver al Menú Principal</a>
            </div>
        </form>
    </div>
</body>

</html>
