<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Últimos Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Últimos Movimientos</h2>

        <div class="list-group mb-4" style="max-height: 390px; overflow-y: auto;">
            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <h6 class="mb-0 fw-semibold">Compra en línea</h6>
                    <small class="text-muted">Hace 2 horas</small>
                </div>
                <span class="badge bg-danger-subtle text-danger rounded-pill fw-bold">-$50.000</span>
            </div>

            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <h6 class="mb-0 fw-semibold">Depósito</h6>
                    <small class="text-muted">Ayer</small>
                </div>
                <span class="badge bg-success-subtle text-success rounded-pill fw-bold">+$100.00</span>
            </div>

            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <h6 class="mb-0 fw-semibold">Transferencia recibida</h6>
                    <small class="text-muted">24 Jun 2026</small>
                </div>
                <span class="badge bg-success-subtle text-success rounded-pill fw-bold">+$75.00</span>
            </div>

            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <h6 class="mb-0 fw-semibold">Compra en línea</h6>
                    <small class="text-muted">18 jun 2026</small>
                </div>
                <span class="badge bg-danger-subtle text-danger rounded-pill fw-bold">-$5,550.00</span>
            </div>

            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <h6 class="mb-0 fw-semibold">Depósito misma cuenta</h6>
                    <small class="text-muted">15 Jun 2026</small>
                </div>
                <span class="badge bg-success-subtle text-success rounded-pill fw-bold">+$10,500.00</span>
            </div>
        </div>

        <div class="d-grid">
            <a href="menu.html" class="btn btn-secondary btn-custom">Volver al Menú Principal</a>
        </div>
    </div>
</body>

</html>
