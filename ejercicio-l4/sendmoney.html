<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Enviar Dinero</h2>

        <form class="mb-4">
            <div class="label form-label fw-medium">Buscar en la agenda:</div>
            <div class="input-group">
                <input type="text" class="form-control" id="searchContact" placeholder="Nombre, alias, o CBU...">
                <button class="btn btn-primary" type="button">Buscar</button>
            </div>
        </form>

        <div class="d-grid mb-4">
            <button type="button" class="btn btn-outline-primary btn-custom btn-sm" data-bs-toggle="modal" data-bs-target="#addContactModal">
                + Agregar nuevo contacto
            </button>
        </div>

        <h5 class="fw-bold mb-3">Contactos</h5>
        <form>
            <div class="list-group mb-4" style="max-height: 200px; overflow-y: auto;">
                <label class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2" type="radio" name="contactSelect" checked>
                        <strong class="d-block d-inline">John Doe</strong>
                        <small class="text-muted d-block ms-4">Alias: john.doe | Banco: ABC Bank</small>
                    </div>
                </label>
                <label class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2" type="radio" name="contactSelect">
                        <strong class="d-block d-inline">Jane Smith</strong>
                        <small class="text-muted d-block ms-4">Alias: jane.smith | Banco: XYZ Bank</small>
                    </div>
                </label>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-custom">Enviar dinero</button>
                <a href="menu.html" class="btn btn-light btn-custom text-secondary">Volver al Menú Principal </a>
            </div>
        </form>
    </div>

    <div class="modal fade" id="addContactModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 16px;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Nuevo Contacto</h5>
                    <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="newContactForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" required placeholder="Ej. Carlos Pérez">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">CBU / CVU</label>
                            <input type="number" class="form-control" required placeholder="22 dígitos">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Alias o Banco</label>
                            <input type="text" class="form-control" required placeholder="Ej. carlos.pago">
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-custom">Guardar Contacto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
