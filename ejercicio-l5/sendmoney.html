<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Enviar Dinero</h2>

        <form class="mb-3">
            <div class="label form-label fw-medium">Buscar en la agenda:</div>
            <div class="input-group">
                <input type="text" class="form-control" id="searchContact" placeholder="Nombre, alias, o CBU...">
                <button class="btn btn-primary" type="button">Buscar</button>
            </div>
        </form>

        <div class="d-grid mb-3">
            <button type="button" class="btn btn-outline-primary btn-custom btn-sm" data-bs-toggle="modal" data-bs-target="#addContactModal">
                + Agregar nuevo contacto
            </button>
        </div>

        <h5 class="fw-bold mb-2">Contactos</h5>
        <form id="sendMoneyForm">
            <div class="list-group mb-3" style="max-height: 160px; overflow-y: auto;">
                <label class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <input class="form-check-input me-2" type="radio" name="contactSelect" value="John Doe" checked>
                    <div>
                        <strong class="d-block">John Doe</strong>
                        <small class="text-muted">Alias: john.doe | Banco: ABC Bank</small>
                    </div>
                </label>
                <label class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <input class="form-check-input me-2" type="radio" name="contactSelect" value="Jane Smith">
                    <div>
                        <strong class="d-block">Jane Smith</strong>
                        <small class="text-muted">Alias: jane.smith | Banco: XYZ Bank</small>
                    </div>
                </label>
            </div>

            <div class="mb-3">
                <label for="sendAmount" class="form-label small fw-bold">Monto a enviar</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="sendAmount" placeholder="0" min="1" required>
                </div>
            </div>

            <div id="sendAlert" class="mt-2 d-done"></div>

            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary btn-custom">Enviar dinero</button>
                <a href="menu.html" class="btn btn-light btn-custom text-secondary">Volver al Menú Principal </a>
            </div>
        </form>
    </div>

    <div class="modal fade" id="addContactModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 16px;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Nuevo Contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="newContactForm">
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Nombre y Apellido</label>
                            <input type="text" id="modalName" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Número de CBU</label>
                            <input type="number" id="modalCbu" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Alias</label>
                            <input type="text" id="modalAlias" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Nombre del Banco</label>
                            <input type="text" id="modalBank" class="form-control" required>
                        </div>
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-primary btn-custom">Guardar Contacto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sendmoney.js"></script>
</body>
</html>
