<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Últimos Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Últimos Movimientos</h2>

        <div class="mb-3">
            <label for="filterType" class="form-label small fw-bold text-muted">Filtrar por tipo de movimiento:</label>
            <select id="filterType" class="form-select form-select-sm">
                <option value="all">Todos los movimientos</option>
                <option value="compra">Compra</option>
                <option value="depósito">Depósito</option>
                <option value="transferencia recibida">Transferencia recibida</option>
            </select>
        </div>

        <div class="list-group mb-4" id="transactionsList" style="max-height: 390px; overflow-y: auto;"></div>

        <div class="d-grid">
            <a href="menu.html" class="btn btn-secondary btn-custom">Volver al Menú Principal</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/transactions.js"></script>
</body>

</html>
