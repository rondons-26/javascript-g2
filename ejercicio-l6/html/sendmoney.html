<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="wallet-card">
        <h2 class="wallet-title">Enviar Dinero</h2>

        <form id="searchForm" class="mb-3">
            <div class="label form-label fw-medium">Buscar en la agenda:</div>
            <div class="input-group">
                <input type="text" class="form-control" id="searchContact" placeholder="Nombre, alias, o CBU...">
                <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
        </form>

        <div class="d-grid mb-3">
            <button type="button" id="btnToggleContactForm" class="btn btn-outline-primary btn-custom btn-sm">
                + Agregar nuevo contacto
            </button>
        </div>

        <div id="addContactFormContainer" class="card p-3 mb-3 border-primary" style="display: none;">
            <h6 class="fw-bold mb-2 text-primary">Nuevo Contacto</h6>
            <form id="newContactForm">
                <div class="mb-2">
                    <label class="form-label small mb-1">Nombre y Apellido</label>
                    <input type="text" id="modalName" class="form-control form-control-sm" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small mb-1">Número de CBU</label>
                    <input type="text" id="modalCbu" class="form-control form-control-sm" maxlength="22" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small mb-1">Alias</label>
                    <input type="text" id="modalAlias" class="form-control form-control-sm" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small mb-1">Nombre del Banco</label>
                    <input type="text" id="modalBank" class="form-control form-control-sm" required>
                </div>
                <div class="d-flex gap-2 justify-content-end mt-3">
                    <button type="button" id="btnCancelContact"
                        class="btn btn-light btn-sm text-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </form>
            <div id="contactValidationAlert" class="mt-2 small"></div>
        </div>

        <h5 class="fw-bold mb-2">Contactos</h5>
        <form id="sendMoneyForm">
            <div class="list-group mb-3" id="agendaContacts" style="max-height: 160px; overflow-y: auto;"></div>
            <div class="mb-3">
                <label for="sendAmount" class="form-label small fw-bold">Monto a enviar</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="sendAmount" placeholder="0" min="1" required>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" id="btnSendMoneyAction" class="btn btn-primary btn-custom"
                    style="display: none;">Enviar dinero</button>
                <a href="menu.html" class="btn btn-light btn-custom text-secondary">Volver al Menú Principal</a>
            </div>
        </form>

        <div id="sendConfirmationContainer" class="mt-3"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/sendmoney.js"></script>
</body>

</html>
